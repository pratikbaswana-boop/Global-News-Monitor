kind = "web"
previewPath = "/"
title = "Global News Intelligence"
version = "1.0.0"
id = "artifacts/global-news"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22519

[services.development]
run = "pnpm --filter @workspace/global-news run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/global-news", "run", "build" ]
publicDir = "artifacts/global-news/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22519"
BASE_PATH = "/"
